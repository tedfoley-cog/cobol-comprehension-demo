# CardDemo Authentication Service — Spring Boot configuration
#
# The original COBOL application uses CICS VSAM files for persistence.
# For this modernization example, H2 in-memory database simulates the
# USRSEC VSAM file.

spring.application.name=carddemo-auth

# H2 in-memory database (simulates USRSEC VSAM file)
spring.datasource.url=jdbc:h2:mem:carddemo;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console for inspection (equivalent to browsing VSAM via CICS CEMT)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Load seed data on startup (equivalent to USRSEC VSAM records)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
