name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint analysis scripts
        run: ruff check analysis/

      - name: Validate dashboard HTML
        run: python -c "from html.parser import HTMLParser; HTMLParser().feed(open('dashboard/index.html').read()); print('HTML valid')"

      - name: Run analysis (smoke test)
        run: python -m analysis.generate_dashboard_data carddemo-source/app dashboard/data
